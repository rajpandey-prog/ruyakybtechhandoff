<style>
:root{--navy:#070b34;--text:#12163f;--muted:#737895;--purple:#6d55bd;--purple2:#8064d8;--lav:#f7f4ff;--lav2:#f1edf9;--line:#e9e6f2;--green:#52a857;--greenBg:#effaf0;--amber:#f39a1d;--amberBg:#fff5e7;--red:#ee4056;--redBg:#fff1f3;--soft:#faf9fc}*{box-sizing:border-box}body{margin:0;background:#fff;color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:13px;line-height:1.45}button,input,select,textarea{font:inherit;color:inherit}.brand{position:fixed;left:48px;top:32px;font-weight:800;letter-spacing:3px;font-size:20px;color:var(--navy);z-index:6}.close{position:fixed;right:48px;top:32px;border:0;background:transparent;color:var(--navy);font-size:25px;cursor:pointer;z-index:6}.shell{min-height:100vh;display:grid;grid-template-columns:258px 1fr}.left{padding:122px 30px 40px 48px}.nav{position:sticky;top:122px}.nav-item{display:flex;gap:12px;align-items:center;height:42px;color:var(--navy);font-size:13px;cursor:pointer}.dot{width:14px;height:14px;border-radius:50%;border:1px solid #cfd1df;background:#fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;position:relative}.nav-item:not(:last-child) .dot:after{content:"";position:absolute;left:6px;top:14px;width:1px;height:30px;background:#e7e5ef}.nav-item.done .dot{background:var(--purple);border-color:var(--purple)}.nav-item.done .dot:before{content:"✓"}.nav-item.current .dot{background:var(--amber);border-color:var(--amber)}.nav-item.current .dot:before{content:"!";font-weight:700}.badge{font-size:10px;border-radius:5px;padding:2px 6px;margin-left:4px}.pending{background:var(--amberBg);color:#d87800}.complete{background:var(--greenBg);color:var(--green)}.autosave{margin-top:34px;display:inline-flex;gap:7px;align-items:center;padding:7px 12px;border-radius:999px;background:var(--greenBg);color:#347d42;font-size:12px}.autosave:before{content:"✓";width:14px;height:14px;border-radius:50%;border:1px solid #8bd194;display:flex;align-items:center;justify-content:center;font-size:9px}.sidecopy{margin-top:12px;color:var(--muted);font-size:12px}.main{padding:30px 50px 100px}.top-title{text-align:center;font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:52px}.stage{max-width:560px;margin:0 auto}.card{border:1px solid var(--line);background:#fff;border-radius:13px;padding:30px 30px 34px;animation:fade .18s ease}.card h2{font-size:20px;margin:0 0 22px;letter-spacing:-.02em}.card h3{font-size:15px;margin:0 0 12px}.sub{font-size:12px;color:var(--muted);margin-top:-14px;margin-bottom:22px}.section{padding:24px 0;border-top:8px solid #f7f7f9}.section:first-child{border-top:0;padding-top:0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}.field{margin-bottom:22px}.field label{display:block;color:#686f91;font-size:12px;margin-bottom:8px}.field .hint{font-size:11px;color:var(--muted);margin-top:7px}.field .auto{font-size:11px;color:var(--purple);margin-top:8px}.field .auto:before{content:"✦ "}.field input,.field select,.field textarea{width:100%;height:42px;border:1px solid #dddfea;border-radius:8px;background:#fff;padding:0 13px;outline:none}.field textarea{height:84px;padding-top:12px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,85,189,.08)}.field.err input,.field.err select,.field.err textarea{border-color:var(--red)}.errtxt{font-size:11px;color:var(--red);margin-top:8px}.input-prefix{display:flex;border:1px solid #dddfea;border-radius:8px;overflow:hidden}.input-prefix span{display:flex;align-items:center;padding:0 14px;background:#fbfbfd;border-right:1px solid #e6e4ef;color:var(--navy);height:42px}.input-prefix input{border:0;border-radius:0;height:42px}.field.err .input-prefix{border-color:var(--red)}.checkline{display:flex;align-items:center;gap:10px;color:var(--navy);font-size:12px}.checkline input{accent-color:var(--purple)}.activity-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.activity{min-height:78px;border:1px solid #e2dfeb;border-radius:9px;background:#fff;padding:16px;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;transition:.15s}.activity:hover{border-color:var(--purple)}.activity.selected{border-color:var(--purple);background:var(--lav)}.activity .ico{font-size:17px;color:var(--muted)}.activity .txt{font-size:12px;color:var(--navy);line-height:1.25}.activity.none{grid-column:1/-1;min-height:48px;justify-content:center}.upload{display:flex;align-items:center;gap:16px;min-height:76px;border:1px solid #e9e6f3;border-radius:12px;background:#fbf9ff;padding:16px 18px;cursor:pointer}.upload .plus{width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid #eee;display:flex;align-items:center;justify-content:center;color:var(--purple);font-size:18px}.upload .ut{font-weight:600;color:var(--navy)}.upload .um{font-size:11px;color:var(--muted);margin-top:4px}.doc-row{display:flex;align-items:center;gap:14px;border:1px solid #ebe8f2;border-radius:12px;min-height:78px;padding:14px;background:#fff;margin-bottom:10px}.doc-thumb{width:54px;height:54px;border-radius:8px;background:linear-gradient(135deg,#fff,#f2f0fb);border:1px solid #eeecf6;display:flex;align-items:center;justify-content:center;color:#9aa}.doc-info{min-width:0;flex:1}.doc-title{font-weight:600;color:var(--navy)}.doc-meta{font-size:11px;color:var(--muted);margin-top:3px}.doc-actions{display:flex;gap:8px}.linkbtn{border:0;background:var(--lav);color:var(--purple);border-radius:999px;padding:7px 11px;cursor:pointer;font-size:11px}.trash{border:0;background:transparent;color:var(--red);cursor:pointer}.divider{height:1px;border-top:1px dashed #dedbe9;margin:24px 0}.radio-row{display:flex;gap:26px;align-items:center;margin-top:12px}.radio-row label{display:flex;gap:8px;align-items:center;color:var(--navy);font-size:13px}.radio-row input{accent-color:var(--purple)}.person-card{border:1px solid #e7e4ef;border-radius:12px;padding:22px;margin-bottom:18px}.person-head{display:flex;align-items:center;gap:10px;margin-bottom:20px;font-weight:600}.pill{font-size:10px;padding:3px 8px;border-radius:6px;background:var(--lav2);color:var(--purple);font-weight:500}.add-btn{border:0;background:var(--lav);color:var(--purple);border-radius:999px;padding:10px 18px;cursor:pointer;font-weight:600}.review-list{border:1px solid var(--line);border-radius:12px;overflow:hidden}.review-row{height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px dashed #dedbe9;cursor:pointer}.review-row:last-child{border-bottom:0}.auth-block{padding:24px;background:#fff;border-top:8px solid #f7f7f9}.consent{display:flex;gap:12px;padding:14px 0;color:var(--navy);font-size:12px}.consent input{accent-color:var(--purple);margin-top:2px}.banner{background:var(--redBg);border:1px solid #ffd4da;color:#bd1f34;border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:12px}.banner.ok{background:var(--greenBg);border-color:#d2efd6;color:#2d7037}.bottom{position:fixed;left:0;right:0;bottom:0;height:72px;background:#fff;border-top:1px solid #eee;display:flex;align-items:center;justify-content:center;gap:240px;z-index:5}.btn{height:40px;border-radius:999px;padding:0 42px;border:0;cursor:pointer}.btn.prev{background:var(--lav);color:var(--purple)}.btn.next{background:var(--purple);color:#fff}.btn.disabled{background:#f3f0fa;color:#c7c0db;cursor:not-allowed}.chat{position:fixed;right:36px;bottom:92px;width:42px;height:42px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;z-index:6}.chat:before{content:"◕"}.modal-bg{position:fixed;inset:0;background:rgba(12,10,25,.32);display:flex;align-items:center;justify-content:center;z-index:99}.modal{width:420px;background:#fff;border-radius:16px;padding:24px;border:1px solid var(--line);box-shadow:0 18px 55px rgba(18,17,50,.22)}.modal h3{margin:0 0 12px}.modal p{color:var(--muted);font-size:12px}.success{position:fixed;inset:0;background:#fff;z-index:100;display:flex;align-items:center;justify-content:center;text-align:center}.success .rings{position:absolute;width:720px;height:720px;border-radius:50%;border:2px solid #e7f5e8;opacity:.7}.success .rings:before,.success .rings:after{content:"";position:absolute;border-radius:50%;border:2px solid #e7f5e8;left:50%;top:50%;transform:translate(-50%,-50%)}.success .rings:before{width:450px;height:450px}.success .rings:after{width:210px;height:210px}.success .tick{width:46px;height:46px;border-radius:50%;background:#58ae5c;color:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 74px;box-shadow:0 0 0 30px #edf8ef}.success h1{font-size:22px;margin:0 0 14px}.success p{color:#777;margin:0 0 28px}.success button{border:0;background:var(--lav);color:var(--purple);border-radius:999px;padding:10px 20px}.hidden{display:none!important}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}@media(max-width:900px){.shell{grid-template-columns:1fr}.left{display:none}.main{padding:70px 20px 100px}.brand{left:22px}.close{right:22px}.bottom{gap:40px}.stage{max-width:100%}}
</style>
</head>
<body>
<div id="success" class="success hidden"><div class="rings"></div><div style="position:relative"><div class="tick">✓</div><h1>Your details have been submitted</h1><p>We'll notify you once verification is complete.</p><button onclick="restart()">Back to Alaan</button></div></div>
<div id="modalRoot"></div>
<div class="brand">ALAAN</div><button class="close">×</button>
<div class="shell"><aside class="left"><nav class="nav" id="nav"></nav><div class="autosave">Your progress is auto-saved</div><div class="sidecopy">You can complete these steps in any order</div></aside><main class="main"><div class="top-title">Submit Your Details</div><div class="stage" id="stage"></div></main></div>
<div class="chat"></div><footer class="bottom"><button class="btn prev" id="prev" onclick="prev()">Prev</button><button class="btn next" id="next" onclick="next()">Next</button></footer>
<script>
const people=['Sagun Jhunjhunwala','Karun Kurien','Antonio M.'];
const activities=['Real Estate Brokers and Agents','Dealers in Precious Metals and Stones (DPMS)','Corporate / Company Service Providers','Auditors, Accountants and Bookkeeping Firms','Trust & Company Formation Service Providers','Independent Legal Professionals & Law Firms'];
const steps=['Submit your details','Company Details','Company Documents','Shareholder & Director Details'];
const state={step:0,app:{first:'Sagun',last:'Jhunjhunwala',email:'sagun.ae@brightlogistics.com',phone:'50 123 4567'},company:{name:'Gulf Technologies',website:'https://company.com',turnover:'1,223,456',address:'Part 19, Tower 2, DIFC Building',city:'Dubai',country:'United Arab Emirates',same:true,opAddress:'',opCity:'',opCountry:'',trn:'100123456700003',tl:'123456',tlExp:'2029-09-12',activity:''},docs:{tl:{base:true,updated:false,deleted:false,filename:'Trade_License_2026.pdf',expiry:'12-09-2029'},moa:{base:true,updated:false,deleted:false,filename:'MOA doc.pdf',expiry:'Not applicable'},bank:{uploaded:false,filename:''},goaml:{uploaded:false,filename:''},aml:{uploaded:false,filename:''},parent:{uploaded:false,filename:''},foreign:{uploaded:false,filename:''}},parent:null,foreignParent:null,shareholders:[{name:'Karun Kurien',role:'Director & Shareholder',addr:'Downtown Dubai',city:'Dubai',country:'United Arab Emirates',uae:true,eid:'784-1990-1234567-1',eidExp:'2028-04-12',pass:'',passExp:''}],co:{who:'',name:'',email:'',phone:'',uae:null,eid:'',eidExp:'',pass:'',passExp:''},auth:{yes:null,who:'',name:'',email:'',phone:'',uae:null,eid:'',eidExp:'',pass:'',passExp:'',proof:'',doc:false,consent:false}};
function isDNFBP(){return !!state.company.activity && state.company.activity!=='None of the above'}
function threshold(){return isDNFBP()?10:25}
function set(objPath,val){let parts=objPath.split('.'),o=state;for(let i=0;i<parts.length-1;i++)o=o[parts[i]];o[parts.at(-1)]=val;render()}
function input(v,path,ph=''){return `<input value="${esc(v)}" placeholder="${ph}" oninput="set('${path}',this.value)">`}
function select(v,opts,path,ph='Select'){return `<select onchange="set('${path}',this.value)"><option value="">${ph}</option>${opts.map(o=>`<option ${v===o?'selected':''}>${o}</option>`).join('')}</select>`}
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;')}
function isEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)}
function isUrl(v){return /^https?:\/\/.+\..+/.test(v)}
function missing(label,ok){return ok?null:label}
function stepErrors(i){let e=[];if(i===0){e.push(missing('First name',state.app.first));e.push(missing('Last name',state.app.last));e.push(missing('Valid email',isEmail(state.app.email)));e.push(missing('Phone number',state.app.phone));}
if(i===1){let c=state.company;e.push(missing('Company name',c.name));e.push(missing('Valid website',isUrl(c.website)));e.push(missing('Annual turnover',c.turnover));e.push(missing('Registered company address',c.address&&c.city&&c.country));if(!c.same)e.push(missing('Operating address',c.opAddress&&c.opCity&&c.opCountry));e.push(missing('Trade licence number',c.tl));e.push(missing('Trade licence expiry date',c.tlExp));e.push(missing('Business activity type',c.activity));}
if(i===2){e.push(missing('Bank statement or financial statement',state.docs.bank.uploaded));if(isDNFBP()){e.push(missing('GoAML registration',state.docs.goaml.uploaded));e.push(missing('AML/CFT policy',state.docs.aml.uploaded));}if(state.parent===null)e.push('Parent organisation answer');if(state.parent===true){e.push(missing('Parent organisation document',state.docs.parent.uploaded));if(state.foreignParent===null)e.push('Foreign parent answer');if(state.foreignParent===true)e.push(missing('Certificate of Incumbency and Share Register',state.docs.foreign.uploaded));}}
if(i===3){state.shareholders.forEach((p,idx)=>{e.push(missing(`Shareholder ${idx+1} full name`,p.name));e.push(missing(`Shareholder ${idx+1} role`,p.role));e.push(missing(`Shareholder ${idx+1} address`,p.addr&&p.city&&p.country));if(p.uae){e.push(missing(`Shareholder ${idx+1} Emirates ID`,p.eid));e.push(missing(`Shareholder ${idx+1} Emirates ID expiry`,p.eidExp));}else{e.push(missing(`Shareholder ${idx+1} passport`,p.pass));e.push(missing(`Shareholder ${idx+1} passport expiry`,p.passExp));}})}
if(i===4){if(isDNFBP()){e.push(missing('Compliance Officer selection',state.co.who));if(state.co.who==='Someone else'){e.push(missing('Compliance Officer full name',state.co.name));e.push(missing('Compliance Officer valid email',isEmail(state.co.email)));e.push(missing('Compliance Officer phone number',state.co.phone));if(state.co.uae===null)e.push('Compliance Officer UAE resident answer');if(state.co.uae===true){e.push(missing('Compliance Officer Emirates ID',state.co.eid));e.push(missing('Compliance Officer Emirates ID expiry',state.co.eidExp));}if(state.co.uae===false){e.push(missing('Compliance Officer passport',state.co.pass));e.push(missing('Compliance Officer passport expiry',state.co.passExp));}}}
if(state.auth.yes===null)e.push('Authorised signatory answer');if(state.auth.yes===true){e.push(missing('Proof method',state.auth.proof));e.push(missing('Authorisation document',state.auth.doc));e.push(missing('Consent checkbox',state.auth.consent));}if(state.auth.yes===false){e.push(missing('Authorised Signatory selection',state.auth.who));if(state.auth.who==='Someone else'){e.push(missing('Authorised Signatory full name',state.auth.name));e.push(missing('Authorised Signatory valid email',isEmail(state.auth.email)));e.push(missing('Authorised Signatory phone number',state.auth.phone));if(state.auth.uae===null)e.push('Authorised Signatory UAE resident answer');if(state.auth.uae===true){e.push(missing('Authorised Signatory Emirates ID',state.auth.eid));e.push(missing('Authorised Signatory Emirates ID expiry',state.auth.eidExp));}if(state.auth.uae===false){e.push(missing('Authorised Signatory passport',state.auth.pass));e.push(missing('Authorised Signatory passport expiry',state.auth.passExp));}}e.push(missing('Proof method',state.auth.proof));e.push(missing('Authorisation document',state.auth.doc));}}
return e.filter(Boolean)}
function allErrors(){return [0,1,2,3,4].flatMap(stepErrors)}
function errorBanner(i=state.step){let e=stepErrors(i);return e.length?`<div class="banner">${e.length} required item${e.length>1?'s need':' needs'} attention on this page: ${e.slice(0,3).join(', ')}${e.length>3?'…':''}</div>`:`<div class="banner ok">All required items on this page look good.</div>`}
function f(label,html,err=false,msg='This field is required'){return `<div class="field ${err?'err':''}"><label>${label}</label>${html}${err?`<div class="errtxt">${msg}</div>`:''}</div>`}
function uploadBox(id,title){let parts=id.split('.'),o=state;for(const p of parts)o=o[p];return `<div class="upload" onclick="markUpload('${id}')"><div class="plus">↥</div><div><div class="ut">Click to upload document</div><div class="um">${title} · Image or PDF format</div></div></div>`}
function markUpload(path){let parts=path.split('.'),o=state;for(let i=0;i<parts.length-1;i++)o=o[parts[i]];let k=parts.at(-1);if(typeof o[k]==='object'){o[k].uploaded=true;o[k].updated=true;o[k].deleted=false;o[k].filename='Updated_document.pdf'}else{o[k]=true}render()}
function docCard(id,label,required=true){let d=state.docs[id];if(d.deleted&&!d.base)return uploadBox('docs.'+id,label);let current=d.updated&&!d.deleted;return `<div class="field"><label>${label}${required?' *':''}</label><div class="doc-row"><div class="doc-thumb">PDF</div><div class="doc-info"><div class="doc-title">${current?'Current Ruya version':'Pre-filled from Alaan profile'}</div><div class="doc-meta">${current?(d.filename||'Updated_document.pdf'):(d.filename||'Document.pdf')} · ${d.expiry?'Expiry: '+d.expiry:''}</div>${current?`<div class="doc-meta">Original Nymcard record retained as previous metadata.</div>`:`<div class="auto">Pre-filled document. You can view or update it.</div>`}</div><div class="doc-actions"><button class="linkbtn" onclick="event.stopPropagation();viewDoc('${id}','${label}')">View</button><button class="linkbtn" onclick="event.stopPropagation();markUpload('docs.${id}')">${current?'Re-upload':'Update'}</button>${current?`<button class="trash" onclick="event.stopPropagation();state.docs.${id}.deleted=true;state.docs.${id}.updated=false;render()">Delete</button>`:''}</div></div>${d.deleted?`<div class="errtxt">Updated version deleted. The pre-filled metadata is still retained, but please re-upload if this document needs an update.</div>`:''}</div>`}
function viewDoc(id,label){let d=state.docs[id];document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>${label}</h3><div class="doc-row"><div class="doc-thumb">PDF</div><div><div class="doc-title">${d.updated&&!d.deleted?'Current Ruya upload':'Pre-filled document'}</div><div class="doc-meta">${d.filename||'Document.pdf'}${d.expiry?' · Expiry: '+d.expiry:''}</div></div></div><p>${d.updated&&!d.deleted?'This is the latest version uploaded in this Ruya application. You can delete it and upload again.':'This document was pre-filled from the existing company profile. You can view it here or upload a newer version.'}</p><button class="btn next" onclick="closeModal()">Done</button></div></div>`}
function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function nav(){document.getElementById('nav').innerHTML=steps.map((s,i)=>{let er=stepErrors(i),done=!er.length;return `<div class="nav-item ${i===state.step?'current':done?'done':''}" onclick="go(${i})"><span class="dot"></span><span>${s}${er.length?'<span class="badge pending">Pending</span>':''}</span></div>`}).join('')}
function go(i){state.step=i;render()}
function prev(){if(state.step>0){state.step--;render()}}
window.next=function(){if(state.step<4){state.step++;render();return}if(!allErrors().length){document.getElementById('success').classList.remove('hidden')}}
function restart(){document.getElementById('success').classList.add('hidden');state.step=0;render()}
function applicant(){let er=stepErrors(0);return `<div class="card"><h2>Tell us about yourself</h2>${errorBanner(0)}<div class="grid2">${f('First name',input(state.app.first,'app.first','Enter'),!state.app.first)}${f('Last name',input(state.app.last,'app.last','Enter'),!state.app.last)}</div><div class="auto">Auto-filled from your Alaan profile</div>${f('Email',input(state.app.email,'app.email','Enter email'),!isEmail(state.app.email),'Enter a valid email id')}<div class="auto">Auto-filled from your Alaan profile</div>${f('Phone number',`<div class="input-prefix"><span>+971</span><input value="${esc(state.app.phone)}" placeholder="Enter" oninput="set('app.phone',this.value)"></div>`,!state.app.phone,'Enter a valid phone number')}<div class="auto">Auto-filled from your Alaan profile</div></div>`}
function company(){let c=state.company;return `<div class="card"><h2>Tell us about your company</h2>${errorBanner(1)}${f('Company name (as it appears on your trade license)',input(c.name,'company.name','Enter company name'),!c.name)}<div class="auto">Auto-filled from your Alaan company profile</div>${f('Company website',input(c.website,'company.website','https://company.com'),!isUrl(c.website),'The link format seems invalid. Please update it.')}<div class="auto">Auto-filled from your Alaan company profile</div>${f("What is your company's annual turnover?",`<div class="input-prefix"><span>AED</span><input value="${esc(c.turnover)}" placeholder="Enter" oninput="set('company.turnover',this.value)"></div>`,!c.turnover)}<div class="auto">Auto-filled from your Alaan company profile</div>${f('Registered company address',`<input value="${esc(c.address)}" placeholder="Enter address" oninput="set('company.address',this.value)"><div class="grid2" style="margin-top:10px"><input value="${esc(c.city)}" placeholder="City" oninput="set('company.city',this.value)"><input value="${esc(c.country)}" placeholder="Country" oninput="set('company.country',this.value)"></div>`,!(c.address&&c.city&&c.country))}<label class="checkline"><input type="checkbox" ${c.same?'checked':''} onchange="state.company.same=this.checked;render()">Same as the company's operating address</label><div class="auto">Auto-filled from your Alaan company profile</div>${!c.same?f('Operating address',`<input value="${esc(c.opAddress)}" placeholder="Enter Address" oninput="set('company.opAddress',this.value)"><div class="grid2" style="margin-top:10px"><input value="${esc(c.opCity)}" placeholder="City" oninput="set('company.opCity',this.value)"><input value="${esc(c.opCountry)}" placeholder="Country" oninput="set('company.opCountry',this.value)"></div>`,!(c.opAddress&&c.opCity&&c.opCountry)):''}${f('Tax Registration Number (optional)',input(c.trn,'company.trn','Enter tax registration number'),false)}${f('Trade License Number',input(c.tl,'company.tl','Enter license number'),!c.tl,'Enter a valid Trade License Number')}${f('Trade License expiry date',`<input type="date" value="${c.tlExp}" oninput="set('company.tlExp',this.value)">`,!c.tlExp)}<div class="field"><label>Business Activity Type</label><div class="activity-grid">${activities.map(a=>`<div class="activity ${c.activity===a?'selected':''}" onclick="state.company.activity='${a.replaceAll("'","\\'")}';render()"><div class="ico">${actIcon(a)}</div><div class="txt">${a}</div></div>`).join('')}<div class="activity none ${c.activity==='None of the above'?'selected':''}" onclick="state.company.activity='None of the above';render()"><div class="txt">None of the above</div></div></div>${!c.activity?'<div class="errtxt">Select one business activity option.</div>':''}</div></div>`}
function actIcon(a){return a.includes('Real')?'▥':a.includes('Precious')?'♧':a.includes('Corporate')?'▣':a.includes('Auditors')?'▤':a.includes('Trust')?'◇':'⚖'}
function docs(){return `<div class="card"><h2>Company Documents</h2>${errorBanner(2)}${docCard('tl','Latest Trade License',true)}<div class="divider"></div>${docCard('moa','Latest Memorandum/Articles of Association (MOA/AOA)',true)}<div class="divider"></div><div class="field"><label>Last 6-month bank statements or latest financial statement *</label>${state.docs.bank.uploaded?uploadedSimple('bank','Bank statement / financial statement'):uploadBox('docs.bank','Bank statement / financial statement')}${!state.docs.bank.uploaded?'<div class="errtxt">This document is required.</div>':''}</div>${isDNFBP()?`<div class="divider"></div><h3>Additional documents</h3><div class="field"><label>Go Anti-Money Laundering (GoAML) registration *</label>${state.docs.goaml.uploaded?uploadedSimple('goaml','GoAML registration'):uploadBox('docs.goaml','GoAML registration')}${!state.docs.goaml.uploaded?'<div class="errtxt">This document is required.</div>':''}</div><div class="field"><label>Anti-Money Laundering & Counter Financing of Terrorism policy (AML/CFT) *</label>${state.docs.aml.uploaded?uploadedSimple('aml','AML/CFT policy'):uploadBox('docs.aml','AML/CFT policy')}${!state.docs.aml.uploaded?'<div class="errtxt">This document is required.</div>':''}</div>`:''}<div class="divider"></div><div class="field"><label>Does your company have a parent organisation?</label><div class="radio-row"><label><input name="parent" type="radio" ${state.parent===true?'checked':''} onchange="state.parent=true;render()">Yes</label><label><input name="parent" type="radio" ${state.parent===false?'checked':''} onchange="state.parent=false;render()">No</label></div>${state.parent===null?'<div class="errtxt">Please answer this question.</div>':''}</div>${state.parent===true?`<div class="field"><label>Ownership structure / parent organisation document *</label>${state.docs.parent.uploaded?uploadedSimple('parent','Ownership structure document'):uploadBox('docs.parent','Ownership structure document')}${!state.docs.parent.uploaded?'<div class="errtxt">This document is required.</div>':''}</div><div class="field"><label>Is the parent organisation outside the UAE?</label><div class="radio-row"><label><input name="foreign" type="radio" ${state.foreignParent===true?'checked':''} onchange="state.foreignParent=true;render()">Yes</label><label><input name="foreign" type="radio" ${state.foreignParent===false?'checked':''} onchange="state.foreignParent=false;render()">No</label></div>${state.foreignParent===null?'<div class="errtxt">Please answer this question.</div>':''}</div>${state.foreignParent===true?`<div class="field"><label>Certificate of Incumbency and Share Register of Members *</label>${state.docs.foreign.uploaded?uploadedSimple('foreign','Foreign parent ownership records'):uploadBox('docs.foreign','Authenticated foreign parent ownership records')}${!state.docs.foreign.uploaded?'<div class="errtxt">This document is required.</div>':''}</div>`:''}`:''}</div>`}
function uploadedSimple(id,label){return `<div class="doc-row"><div class="doc-thumb">PDF</div><div class="doc-info"><div class="doc-title">${label}</div><div class="doc-meta">Uploaded_document.pdf</div></div><div class="doc-actions"><button class="linkbtn" onclick="viewDoc('${id}','${label}')">View</button><button class="linkbtn" onclick="markUpload('docs.${id}')">Re-upload</button><button class="trash" onclick="state.docs.${id}.uploaded=false;render()">Delete</button></div></div>`}
function shareholders(){return `<div class="card"><h2>Shareholder & Director Details</h2><div class="sub">Details of all shareholders and directors with ${threshold()}% or more ownership are required for regulatory compliance.</div>${errorBanner(3)}${state.shareholders.map((p,i)=>`<div class="person-card"><div class="person-head">Shareholder/Director ${i+1}<span class="pill">Pending</span><button class="trash" onclick="state.shareholders.splice(${i},1);render()">⌫</button></div>${f('Full name',`<input value="${esc(p.name)}" oninput="state.shareholders[${i}].name=this.value;render()">`,!p.name)}${f('Select role',`<select onchange="state.shareholders[${i}].role=this.value;render()"><option value="">Select</option><option ${p.role==='Director'?'selected':''}>Director</option><option ${p.role==='Shareholder'?'selected':''}>Shareholder</option><option ${p.role==='Director & Shareholder'?'selected':''}>Director & Shareholder</option></select>`,!p.role)}${f('Complete residential address',`<input value="${esc(p.addr)}" placeholder="Enter address" oninput="state.shareholders[${i}].addr=this.value;render()"><div class="grid2" style="margin-top:10px"><input value="${esc(p.city)}" placeholder="City" oninput="state.shareholders[${i}].city=this.value;render()"><input value="${esc(p.country)}" placeholder="Country" oninput="state.shareholders[${i}].country=this.value;render()"></div>`,!(p.addr&&p.city&&p.country))}<div class="field"><label>Is this shareholder a UAE resident?</label><div class="radio-row"><label><input name="uae${i}" type="radio" ${p.uae?'checked':''} onchange="state.shareholders[${i}].uae=true;render()">Yes</label><label><input name="uae${i}" type="radio" ${!p.uae?'checked':''} onchange="state.shareholders[${i}].uae=false;render()">No</label></div></div>${p.uae?`${f('Emirates ID Number',`<input value="${esc(p.eid)}" oninput="state.shareholders[${i}].eid=this.value;render()">`,!p.eid)}${f('Emirates ID expiry date',`<input type="date" value="${p.eidExp}" oninput="state.shareholders[${i}].eidExp=this.value;render()">`,!p.eidExp)}${uploadBox('docs.bank','Upload Emirates ID')}`:`${f('Passport Number',`<input value="${esc(p.pass)}" oninput="state.shareholders[${i}].pass=this.value;render()">`,!p.pass)}${f('Passport expiry date',`<input type="date" value="${p.passExp}" oninput="state.shareholders[${i}].passExp=this.value;render()">`,!p.passExp)}${uploadBox('docs.bank','Upload Passport')}`}</div>`).join('')}<button class="add-btn" onclick="state.shareholders.push({name:'',role:'',addr:'',city:'',country:'',uae:true,eid:'',eidExp:'',pass:'',passExp:''});render()">＋ Add Another Shareholder/Director</button></div>`}
function review(){let errors=allErrors();return `<div class="card"><h2>You're almost done</h2><div class="sub">Please review your information before submission. You can edit any section if needed.</div>${errors.length?`<div class="banner">Submit is hidden until all mandatory fields are complete. ${errors.length} item${errors.length>1?'s':''} still need attention.</div>`:`<div class="banner ok">All mandatory fields are complete. You can submit now.</div>`}<div class="review-list">${steps.map((x,i)=>{let er=stepErrors(i);return `<div class="review-row" onclick="go(${i})"><span>${x}</span><span><span class="badge ${er.length?'pending':'complete'}">${er.length?'Pending':'Completed'}</span> ›</span></div>`}).join('')}</div>${isDNFBP()?`<div class="auth-block"><h3>Compliance Officer</h3>${coBlock()}</div>`:''}<div class="auth-block"><h3>Authorised Signatory</h3>${authBlock()}</div></div>`}
function coBlock(){return `<div class="field"><label>Who is your company's Compliance Officer?</label>${select(state.co.who,[...people,'Someone else'],'co.who','Select')}</div>${state.co.who==='Someone else'?`${f('Full name',input(state.co.name,'co.name','Enter name'),!state.co.name)}${f('Role',`<input value="Compliance Officer" disabled>`,false)}<div class="grid2">${f('Email',input(state.co.email,'co.email','Enter email'),!isEmail(state.co.email),'Enter a valid email id')}${f('Phone number',input(state.co.phone,'co.phone','Enter phone'),!state.co.phone)}</div><div class="field"><label>Is this person a UAE citizen or resident?</label><div class="radio-row"><label><input name="couae" type="radio" ${state.co.uae===true?'checked':''} onchange="state.co.uae=true;render()">Yes</label><label><input name="couae" type="radio" ${state.co.uae===false?'checked':''} onchange="state.co.uae=false;render()">No</label></div>${state.co.uae===null?'<div class="errtxt">Please answer this question.</div>':''}</div>${state.co.uae===true?`${f('Emirates ID number',input(state.co.eid,'co.eid','784-XXXX-XXXXXXX-X'),!state.co.eid)}${f('Emirates ID expiry date',`<input type="date" value="${state.co.eidExp}" oninput="set('co.eidExp',this.value)">`,!state.co.eidExp)}`:''}${state.co.uae===false?`${f('Passport number',input(state.co.pass,'co.pass','Enter passport number'),!state.co.pass)}${f('Passport expiry date',`<input type="date" value="${state.co.passExp}" oninput="set('co.passExp',this.value)">`,!state.co.passExp)}`:''}`:''}`}
function authBlock(){return `<div class="field"><label>Are you authorised to open a bank account on behalf of your company?</label><div class="radio-row"><label><input name="authyes" type="radio" ${state.auth.yes===true?'checked':''} onchange="state.auth.yes=true;render()">Yes</label><label><input name="authyes" type="radio" ${state.auth.yes===false?'checked':''} onchange="state.auth.yes=false;render()">No</label></div>${state.auth.yes===null?'<div class="errtxt">Please answer this question.</div>':''}</div>${state.auth.yes===true?authYes():''}${state.auth.yes===false?authNo():''}`}
function authYes(){return `${f('How would you like to prove this?',select(state.auth.proof,['MOA/AOA','Board Resolution','Power of Attorney','Authorised Signatory Letter','Other supporting document'],'auth.proof','Choose'),!state.auth.proof)}${state.auth.proof?`<div class="field"><label>Upload authorisation document *</label>${state.auth.doc?uploadedAuth():`<div class="upload" onclick="state.auth.doc=true;render()"><div class="plus">↥</div><div><div class="ut">Click to upload document</div><div class="um">Authorisation proof</div></div></div>`}${!state.auth.doc?'<div class="errtxt">This document is required.</div>':''}</div><label class="consent"><input type="checkbox" ${state.auth.consent?'checked':''} onchange="state.auth.consent=this.checked;render()"><span>I consent to open an Alaan Business Account on behalf of the company.</span></label>${!state.auth.consent?'<div class="errtxt">Consent is required.</div>':''}`:''}`}
function uploadedAuth(){return `<div class="doc-row"><div class="doc-thumb">PDF</div><div class="doc-info"><div class="doc-title">Authorisation proof</div><div class="doc-meta">Uploaded_document.pdf</div></div><div class="doc-actions"><button class="linkbtn" onclick="viewDoc('auth','Authorisation proof')">View</button><button class="linkbtn" onclick="state.auth.doc=true;render()">Re-upload</button><button class="trash" onclick="state.auth.doc=false;render()">Delete</button></div></div>`}
function authNo(){return `${f('Who is authorised to open a bank account on behalf of your company?',select(state.auth.who,[...people,'Someone else'],'auth.who','Choose'),!state.auth.who)}${state.auth.who==='Someone else'?`${f('Full name',input(state.auth.name,'auth.name','Enter name'),!state.auth.name)}${f('Role',`<input value="Authorised Signatory" disabled>`,false)}<div class="grid2">${f('Email',input(state.auth.email,'auth.email','Enter email'),!isEmail(state.auth.email),'Enter a valid email id')}${f('Phone number',input(state.auth.phone,'auth.phone','Enter phone'),!state.auth.phone)}</div><div class="field"><label>Is this person a UAE citizen or resident?</label><div class="radio-row"><label><input name="asuae" type="radio" ${state.auth.uae===true?'checked':''} onchange="state.auth.uae=true;render()">Yes</label><label><input name="asuae" type="radio" ${state.auth.uae===false?'checked':''} onchange="state.auth.uae=false;render()">No</label></div>${state.auth.uae===null?'<div class="errtxt">Please answer this question.</div>':''}</div>${state.auth.uae===true?`${f('Emirates ID number',input(state.auth.eid,'auth.eid','784-XXXX-XXXXXXX-X'),!state.auth.eid)}${f('Emirates ID expiry date',`<input type="date" value="${state.auth.eidExp}" oninput="set('auth.eidExp',this.value)">`,!state.auth.eidExp)}`:''}${state.auth.uae===false?`${f('Passport number',input(state.auth.pass,'auth.pass','Enter passport number'),!state.auth.pass)}${f('Passport expiry date',`<input type="date" value="${state.auth.passExp}" oninput="set('auth.passExp',this.value)">`,!state.auth.passExp)}`:''}`:''}${state.auth.who?`${f('How will you prove this person is authorised?',select(state.auth.proof,['MOA/AOA','Board Resolution','Power of Attorney','Authorised Signatory Letter','Other supporting document'],'auth.proof','Choose'),!state.auth.proof)}${state.auth.proof?`<div class="field"><label>Upload authorisation document *</label>${state.auth.doc?uploadedAuth():`<div class="upload" onclick="state.auth.doc=true;render()"><div class="plus">↥</div><div><div class="ut">Click to upload document</div><div class="um">Authorisation proof</div></div></div>`}${!state.auth.doc?'<div class="errtxt">This document is required.</div>':''}</div><div class="hint">Consent will be requested from the authorised signatory before final Ruya submission.</div>`:''}`:''}`}
function render(){nav();let arr=[applicant,company,docs,shareholders,review];document.getElementById('stage').innerHTML=arr[state.step]();document.getElementById('prev').style.visibility=state.step===0?'hidden':'visible';let next=document.getElementById('next');if(state.step===4){let errs=allErrors();if(errs.length){next.textContent='Complete required fields';next.className='btn disabled';next.onclick=()=>{};}else{next.textContent='Submit';next.className='btn next';next.onclick=window.next;}}else{next.textContent='Next';next.className='btn next';next.onclick=window.next;}}
render();
</script>
</body>
</html>
